databases:
  - name: tax-sale-db
    plan:  free

services:
  - type: web
    name: tax-sale-web
    runtime: ruby
    plan: starter
    buildCommand: "bundle install && bundle exec rails assets:precompile && bundle exec rails db:migrate"
    startCommand: bundle exec puma -C config/puma.rb
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: GOOGLE_SHEETS_SHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GOOGLE_MAPS_MAP_ID
        sync: false
      - key: REGRID_API_TOKEN
        sync: false
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: tax-sale-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: tax-sale-redis
          property: connectionString

  # ── WORKER SERVICE ─────────────────────────────────────────────────────────
  # runtime: docker → Usa el Dockerfile (que instala libjemalloc2).
  # El docker-entrypoint activa LD_PRELOAD automáticamente.
  # Con runtime: ruby (anterior), jemalloc NO estaba instalado y LD_PRELOAD
  # apuntaba a un archivo inexistente — error silencioso.
  - type: worker
    name: tax-sale-worker
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    # ⚠️ CRÍTICO: Usar docker-entrypoint para activar jemalloc (LD_PRELOAD).
    # `dockerCommand` sobrescribe ENTRYPOINT + CMD del Dockerfile.
    # Sin esto, el worker corre SIN jemalloc → fragmentación RAM → OOM a ~60min.
    dockerCommand: ./bin/docker-entrypoint bundle exec sidekiq -C config/sidekiq.yml
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: GOOGLE_SHEETS_SHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: REGRID_API_TOKEN
        sync: false
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      # MALLOC_ARENA_MAX: Limits glibc memory arenas to reduce RSS.
      # Sidekiq with 2 threads → value 2 is optimal.
      - key: MALLOC_ARENA_MAX
        value: "2"
      # Ruby GC tuning for 512MB Starter plan:
      # - GROWTH_FACTOR 1.1: Heap grows 10% per GC cycle (default 1.8 = 80%)
      # - GROWTH_MAX_SLOTS: Cap new slots per expansion
      # - HEAP_FREE_SLOTS_MIN_RATIO: Keep fewer free slots (less wasted memory)
      # Trade-off: more GC pauses, but dramatically lower peak memory.
      - key: RUBY_GC_HEAP_GROWTH_FACTOR
        value: "1.1"
      - key: RUBY_GC_HEAP_GROWTH_MAX_SLOTS
        value: "10000"
      - key: RUBY_GC_HEAP_FREE_SLOTS_MIN_RATIO
        value: "0.15"
      - key: DATABASE_URL
        fromDatabase:
          name: tax-sale-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: tax-sale-redis
          property: connectionString

  - type: redis
    name: tax-sale-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: noeviction
