test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# ── Google Cloud Storage (PRODUCCIÓN) ────────────────────────────────────────
# Usar para almacenar PDFs de reportes (AVM, Property Scope, Title Search).
# Render usa contenedores efímeros: el disco local se borra en cada deploy.
#
# Setup en Render Dashboard:
#   GCS_BUCKET      = tax-sale-reports-production
#   GCS_PROJECT_ID  = tu-proyecto-gcp
#   GOOGLE_APPLICATION_CREDENTIALS = /etc/secrets/gcs-credentials.json
#     (montar el JSON del service account como Secret File en Render)
#
# Permisos requeridos en el Service Account:
#   - storage.objects.create
#   - storage.objects.get
#   - storage.objects.delete
#
google:
  service: GCS
  credentials: <%= ENV.fetch("GOOGLE_APPLICATION_CREDENTIALS", nil) %>
  project: <%= ENV.fetch("GCS_PROJECT_ID", "your-gcp-project") %>
  bucket: <%= ENV.fetch("GCS_BUCKET", "tax-sale-reports-production") %>

