# config/sidekiq.yml
# ⚠️ CONCURRENCY: Render Starter plan = 512 MB RAM.
# Con 5 threads + SyncSheetJob (Google API + ActiveRecord), el worker supera
# el límite de memoria y Render lo mata (SIGKILL → OOM → Zombie Process).
# 2 threads mantiene el RSS bajo ~300 MB con margen de seguridad.
:concurrency: 2
:queues:
  - critical
  - default
  - data_sync
  - reports
  - mailers
  - low

# Sidekiq-cron: schedule automático
:cron:
  sync_sheet_job:
    cron: "0 7,19 * * *"   # cada 12h: 3AM + 3PM ET = 7:00 + 19:00 UTC
    class: SyncSheetJob
    args:
      - "<%= ENV['GOOGLE_SHEETS_SHEET_ID'] %>"
    queue: data_sync
    description: "Importar propiedades desde Google Sheets a PostgreSQL (cada 12h)"

  expire_auctions:
    cron: "0 6 * * *"   # Diario a las 6:00 UTC = 2:00 AM ET
    class: ExpireAuctionsJob
    queue: default
    description: "Marcar como completed las subastas con sale_date pasada"

  regrid_key_health_check:
    cron: "0 12 1 * *"  # Día 1 de cada mes, 12:00 UTC = 8:00 AM ET
    class: RegridKeyHealthCheckJob
    queue: low
    description: "Verificar validez mensual de la API key de Regrid (rota mes a mes)"

  reset_monthly_usage:
    cron: "0 0 * * *"   # Diario a las 00:00 UTC
    class: ResetMonthlyUsageJob
    queue: default
    description: "Resetear used_parcels/avm/scope/title_search para suscripciones cuyo current_period_end ya venció"